services:
  postgres:
    image: postgres:16
    container_name: quatecalc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: quatecalc
      POSTGRES_PASSWORD: quatecalc
      POSTGRES_DB: quatecalc
    ports:
      - "5432:5432"
    volumes:
      - quatecalc_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quatecalc"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: quatecalc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - quatecalc_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  quatecalc_pg:
  quatecalc_redis:
